<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Pixeler | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lenis@1.0.5/dist/lenis.min.js"></script>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:'Plus Jakarta Sans',sans-serif;
}

/* NAVBAR */

nav{
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:100;
}

.nav-inner{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
}

.logo{
width:46px;
}

/* SECTIONS (fixed scrolling issue) */

section{
padding:140px 24px;
}

.container{
max-width:1200px;
margin:auto;
width:100%;
}

.title{
font-size:40px;
font-weight:700;
text-align:center;
margin-bottom:70px;
}

/* HERO */

.hero{
background:radial-gradient(circle at top,#111,#000 70%);
text-align:center;
padding-top:200px;
padding-bottom:200px;
}

/* GRID */

.grid3{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
}

.grid4{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:24px;
}

/* CARDS */

.card{
background:#0a0a0a;
border:1px solid rgba(255,255,255,.08);
border-radius:14px;
overflow:hidden;
transition:.35s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
border-color:#10b981;
}

/* IMAGES */

.work-img{
width:100%;
max-height:75vh;
object-fit:contain;
background:#000;
}

.brand-img{
width:100%;
max-height:75vh;
object-fit:contain;
padding:10px;
}

.menu-preview{
width:100%;
max-height:60vh;
object-fit:contain;
}

/* VIDEO */

video{
width:100%;
max-height:80vh;
object-fit:contain;
border-radius:12px;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
align-items:center;
justify-content:center;
padding:40px;
z-index:200;
overflow:auto;
}

.modal img{
max-width:95vw;
max-height:95vh;
object-fit:contain;
display:block;
margin:auto;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>
<div class="nav-inner">
<img src="V.png" class="logo">

<div style="display:flex;gap:28px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;">
<a href="#work">Work</a>
<a href="#brand">Brand</a>
<a href="#contact">Contact</a>
</div>

</div>
</nav>

<!-- HERO -->

<section class="hero">
<div class="container">

<h1 style="font-size:72px;font-weight:800;">
VOID<span style="color:#10b981">_</span>PIXELER
</h1>

<p style="margin-top:20px;color:#999;letter-spacing:.3em;text-transform:uppercase;">
Graphic & Creative Designer
</p>

</div>
</section>

<!-- VIDEO -->

<section>
<div class="container">

<h2 class="title">Studio Motion</h2>

<video autoplay muted loop playsinline controls>
<source src="animation.mp4" type="video/mp4">
Your browser does not support video.
</video>

</div>
</section>

<!-- WORK -->

<section id="work">
<div class="container">

<h2 class="title">Selected Work</h2>

<div class="grid3">

<div class="card" onclick="openModal('burger1.png')">
<img src="burger1.png" class="work-img">
</div>

<div class="card" onclick="openModal('burger2.png')">
<img src="burger2.png" class="work-img">
</div>

<div class="card" onclick="openModal('pizza1.png')">
<img src="pizza1.png" class="work-img">
</div>

</div>

<h3 style="margin-top:80px;font-size:28px;">Restaurant Menu Design</h3>

<div class="grid4" style="margin-top:30px;">

<div class="card" onclick="openMenu()">
<img src="1.png" class="menu-preview">
</div>

<div class="card" onclick="openMenu()">
<img src="2.png" class="menu-preview">
</div>

<div class="card" onclick="openMenu()">
<img src="3.png" class="menu-preview">
</div>

<div class="card" onclick="openMenu()">
<img src="4.png" class="menu-preview">
</div>

</div>

</div>
</section>

<!-- BRAND -->

<section id="brand">
<div class="container">

<h2 class="title">Brand Work</h2>

<div class="grid3">

<div class="card" onclick="openModal('fanta.png')">
<img src="fanta.png" class="brand-img">
</div>

<div class="card" onclick="openModal('o.png')">
<img src="o.png" class="brand-img">
</div>

</div>

</div>
</section>

<!-- PROFESSIONAL IDENTITY -->

<section>
<div class="container">

<h2 class="title">Professional Identity</h2>

<div class="grid3">

<div class="card" onclick="openModal('card1.png')">
<img src="card1.png" class="work-img">
</div>

<div class="card" onclick="openModal('card2.png')">
<img src="card2.png" class="work-img">
</div>

</div>

</div>
</section>

<!-- CONTACT -->

<section id="contact">
<div class="container" style="text-align:center;">

<h2 style="font-size:48px;margin-bottom:40px;">Let's Work</h2>

<div style="display:flex;gap:30px;justify-content:center;flex-wrap:wrap;">

<a href="https://instagram.com/void_pixeler" target="_blank" class="card" style="padding:18px 40px;">
Instagram
</a>

<a href="https://t.me/its_ayush-here" target="_blank" class="card" style="padding:18px 40px;">
Telegram
</a>

</div>

</div>
</section>

<!-- IMAGE MODAL -->

<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<!-- MENU MODAL -->

<div id="menuModal" class="modal" onclick="closeMenu()">

<div style="display:grid;grid-template-columns:1fr;gap:80px;max-width:900px;">
<img src="1.png">
<img src="2.png">
<img src="3.png">
<img src="4.png">
</div>

</div>

<script>

/* smooth scrolling */

const lenis = new Lenis({duration:1.2})

function raf(time){
lenis.raf(time)
requestAnimationFrame(raf)
}

requestAnimationFrame(raf)


/* image modal */

function openModal(src){
document.getElementById("modal").style.display="flex"
document.getElementById("modalImg").src=src
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

function openMenu(){
document.getElementById("menuModal").style.display="flex"
}

function closeMenu(){
document.getElementById("menuModal").style.display="none"
}

</script>

</body>
</html>
